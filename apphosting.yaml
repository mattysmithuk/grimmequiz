# Firebase App Hosting configuration.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Keep one instance always warm so the SQLite database in data/quiz.db is not
  # wiped when the app goes idle. maxInstances is also 1 so all reads/writes hit
  # the same instance (SQLite is per-instance and not shared). Note: data is
  # still lost on a redeploy or crash — export the CSV regularly during the show.
  minInstances: 1
  maxInstances: 1
  concurrency: 80
  cpu: 1
  memoryMiB: 512


env:
  # Admin leaderboard password, available at build and runtime.
  #
  # This is provided as a plain value so no Cloud Secret Manager setup is
  # required. If you would rather store it as a managed secret, replace the
  # `value:` line below with `secret: ADMIN_PASSWORD` and run:
  #   firebase apphosting:secrets:set ADMIN_PASSWORD
  #   firebase apphosting:secrets:grantaccess ADMIN_PASSWORD --backend <backend-id>
  - variable: ADMIN_PASSWORD
    value: grimme-red-2026
    availability:
      - BUILD
      - RUNTIME
